appId: in.edgeflow.erp
productName: EdgeFlow ERP
copyright: "Copyright © 2025 EdgeFlow Technologies Pvt. Ltd."

directories:
  output: dist
  buildResources: build

files:
  - electron/**/*
  - package.json

# ── Windows ────────────────────────────────────────────────────────────────────
win:
  icon: build/icon.png
  publisherName: "EdgeFlow Technologies Pvt. Ltd."
  verifyUpdateCodeSignature: false
  target:
    - target: nsis
      arch: [x64]
    - target: msi
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: EdgeFlow ERP
  artifactName: "EdgeFlow-ERP-Setup.exe"

msi:
  artifactName: "EdgeFlow-ERP.msi"

# ── macOS ──────────────────────────────────────────────────────────────────────
# Each arch built separately in CI via --x64 / --arm64 flags
mac:
  icon: build/icon.png
  category: public.app-category.finance
  darkModeSupport: true
  gatekeeperAssess: false
  target:
    - target: dmg

dmg:
  title: "EdgeFlow ERP Installer"
  icon: build/icon.png
  artifactName: "EdgeFlow-ERP-${arch}.dmg"
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file

# ── Linux ──────────────────────────────────────────────────────────────────────
linux:
  icon: build/icon.png
  category: Office
  description: AI-powered accounting & GST software for India
  artifactName: "EdgeFlow-ERP-${arch}.AppImage"
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]

# ── Publish (GitHub Releases) ─────────────────────────────────────────────────
publish:
  provider: github
  owner: rubanrajofficial2602
  repo: edgeflow-desktop
  releaseType: release
