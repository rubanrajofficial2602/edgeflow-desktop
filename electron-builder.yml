appId: in.edgeflow.erp
productName: EdgeFlow ERP
copyright: "Copyright © 2025 EdgeFlow Technologies Pvt. Ltd."

directories:
  output: dist
  buildResources: build

# Files to include in the build
files:
  - electron/**/*
  - package.json

# ── Windows ────────────────────────────────────────────────────────────────────
win:
  icon: build/icon.png
  publisherName: "EdgeFlow Technologies Pvt. Ltd."
  verifyUpdateCodeSignature: false
  target:
    - target: nsis         # Standard .exe installer
      arch: [x64]
    - target: msi          # MSI for enterprise/IT deployment
      arch: [x64]
    - target: msix         # Microsoft Store package
      arch: [x64]
    - target: portable     # Portable .exe (no install needed)
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: EdgeFlow ERP
  installerSidebar: build/icon.png

msix:
  applicationId: EdgeFlowERP
  backgroundColor: "#060B14"
  identityName: EdgeFlowTechnologies.EdgeFlowERP
  publisher: "CN=EdgeFlow Technologies Pvt. Ltd., O=EdgeFlow Technologies, L=Chennai, S=Tamil Nadu, C=IN"
  publisherDisplayName: "EdgeFlow Technologies Pvt. Ltd."

# ── macOS ──────────────────────────────────────────────────────────────────────
mac:
  icon: build/icon.png
  category: public.app-category.finance
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg          # Standard .dmg for direct download
      arch: [x64, arm64]
    - target: zip          # Auto-updater zip
      arch: [x64, arm64]

dmg:
  title: "EdgeFlow ERP Installer"
  icon: build/icon.png
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file

# ── Linux ──────────────────────────────────────────────────────────────────────
linux:
  icon: build/icon.png
  category: Office
  description: AI-powered accounting & GST software for India
  target:
    - target: AppImage     # Universal Linux app
      arch: [x64]
    - target: deb          # Debian/Ubuntu .deb package
      arch: [x64]
    - target: rpm          # Red Hat/Fedora .rpm package
      arch: [x64]

# ── Publish (GitHub Releases) ─────────────────────────────────────────────────
publish:
  provider: github
  owner: rubanrajofficial2602
  repo: edgeflow-desktop
  releaseType: release
