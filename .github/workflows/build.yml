name: Build & Release EdgeFlow ERP Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ── Windows Build ────────────────────────────────────────────────────────────
  build-windows:
    name: "🪟 Windows (.exe + .msi)"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build Windows installers
        run: npm run build:win
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            dist/*.exe
            dist/*.msi
          if-no-files-found: warn

  # ── macOS Build ──────────────────────────────────────────────────────────────
  build-macos:
    name: "🍎 macOS (.dmg)"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build macOS Intel DMG
        run: npx electron-builder --mac dmg --x64
      - name: Build macOS Apple Silicon DMG
        run: npx electron-builder --mac dmg --arm64
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: dist/*.dmg
          if-no-files-found: warn

  # ── Linux Build ──────────────────────────────────────────────────────────────
  build-linux:
    name: "🐧 Linux (.AppImage + .deb)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install system dependencies
        run: sudo apt-get update -y && sudo apt-get install -y fakeroot dpkg
      - name: Install dependencies
        run: npm install
      - name: Build Linux packages
        run: npm run build:linux
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: warn

  # ── Publish GitHub Release ────────────────────────────────────────────────────
  publish-release:
    name: "🚀 Publish GitHub Release"
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-dist
          merge-multiple: true

      - name: List built files
        run: find all-dist -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "EdgeFlow ERP ${{ github.ref_name }}"
          draft: false
          prerelease: false
          body: |
            ## 🚀 EdgeFlow ERP ${{ github.ref_name }}

            India's AI-powered GST & accounting desktop app — works like Tally, powered by AI.

            ---

            ### 📥 Download for your platform

            | Platform | Download |
            |----------|----------|
            | 🪟 **Windows** | `EdgeFlow-ERP-Setup.exe` |
            | 🪟 **Windows Enterprise** | `EdgeFlow-ERP.msi` |
            | 🍎 **macOS Intel** | `EdgeFlow-ERP-x64.dmg` |
            | 🍎 **macOS Apple Silicon** | `EdgeFlow-ERP-arm64.dmg` |
            | 🐧 **Linux** | `EdgeFlow-ERP-x64.AppImage` |

            ---

            **Support:** support@edgeflow.in
          files: all-dist/**
          fail_on_unmatched_files: false
